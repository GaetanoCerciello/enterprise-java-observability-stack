# =========================================
# Spring Boot Application Configuration
# =========================================
spring.application.name=enterprise-java-observability-stack
server.port=8080
server.servlet.context-path=/

# =========================================
# Logging Configuration
# =========================================
logging.level.root=INFO
logging.level.com.observability=DEBUG
logging.level.org.apache.camel=INFO
logging.level.org.springframework.boot.actuate=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# =========================================
# Spring Boot Actuator Configuration
# =========================================
# Espone tutti gli endpoint per monitoraggio
management.endpoints.web.exposure.include=health,metrics,prometheus,environment,info
management.endpoint.health.show-details=always
management.endpoint.health.show-components=always

# =========================================
# Prometheus e Micrometer Configuration
# =========================================
# Configura il registro Prometheus per l'export delle metriche
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=${spring.application.name}
management.metrics.tags.environment=development
management.metrics.distribution.percentiles-histogram.http.server.requests=true

# Metrica Custom
management.metrics.enable.jvm=true
management.metrics.enable.process=true
management.metrics.enable.system=true
management.metrics.enable.logback=true
management.metrics.enable.tomcat=true

# =========================================
# Apache Camel Configuration
# =========================================
# Abilita il monitoraggio di Camel
camel.springboot.auto-startup=true
camel.metrics.enabled=true

# =========================================
# Application-specific Configuration
# =========================================
# Simulazione database URL (non usato in questa demo)
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =========================================
# Info Endpoint Configuration
# =========================================
info.app.name=Enterprise Java Observability Stack
info.app.description=Spring Boot 3 application con Prometheus e Apache Camel
info.app.version=1.0.0
info.app.java.version=17
info.app.framework=Spring Boot 3.2.0
info.team.name=Gaetano Cerciello
info.team.role=IT Support Specialist & Java Developer
